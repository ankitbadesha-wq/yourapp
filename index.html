<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Story Video Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">🎬 Story Video Builder</div>
  <div class="brand-sub">Original educational videos for kids</div>
</header>

<nav class="stepper" id="stepper"></nav>

<main class="layout">
  <section class="panel" id="panel"></section>
  <aside class="helper" id="helper"></aside>
</main>

<footer class="navbar">
  <button id="backBtn" class="btn ghost">← Back</button>
  <div class="savehint" id="saveHint">Saved</div>
  <button id="nextBtn" class="btn primary">Next →</button>
</footer>

<script src="app.js"></script>
</body>
</html>
